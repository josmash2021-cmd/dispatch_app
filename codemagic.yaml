workflows:

  # -----------------------------------------------------------------------
  # iOS Sideloadly: unsigned IPA for use with Sideloadly (no Apple dev account needed)
  # -----------------------------------------------------------------------
  ios-sideloadly:
    name: iOS Sideloadly (unsigned IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase_credentials
        - google_maps
      vars:
        BUNDLE_ID: "com.uberclone.dispatch.dispatchApp"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "master"
          include: true
          source: true

    scripts:
      - name: Normalize plist line endings (CRLF to LF)
        script: |
          find "$CM_BUILD_DIR/ios" -name "*.plist" -exec sed -i 's/\r//' {} +
          find "$CM_BUILD_DIR/ios" -name "*.xcconfig" -exec sed -i 's/\r//' {} +
          echo "Line endings normalized."

      - name: Write GoogleService-Info.plist
        script: |
          cat > "$CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>API_KEY</key>
          <string>AIzaSyAdwPUqsI8UuaEQEXw6aaNz7umWeGdWjjg</string>
          <key>GCM_SENDER_ID</key>
          <string>56054738352</string>
          <key>PLIST_VERSION</key>
          <string>1</string>
          <key>BUNDLE_ID</key>
          <string>com.uberclone.dispatch.dispatchApp</string>
          <key>PROJECT_ID</key>
          <string>cruise-af9f1</string>
          <key>STORAGE_BUCKET</key>
          <string>cruise-af9f1.firebasestorage.app</string>
          <key>IS_ADS_ENABLED</key>
          <false/>
          <key>IS_ANALYTICS_ENABLED</key>
          <false/>
          <key>IS_APPINVITE_ENABLED</key>
          <true/>
          <key>IS_GCM_ENABLED</key>
          <true/>
          <key>IS_SIGNIN_ENABLED</key>
          <true/>
          <key>GOOGLE_APP_ID</key>
          <string>1:56054738352:ios:0000000000000000</string>
          </dict>
          </plist>
          EOF
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > "$CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist"
            echo "Real GoogleService-Info.plist injected from secret."
          fi

      - name: Inject Google Maps API key
        script: |
          if [ -n "$MAPS_API_KEY_IOS" ]; then
            /usr/libexec/PlistBuddy -c "Set :GMSApiKey $MAPS_API_KEY_IOS" "$CM_BUILD_DIR/ios/Runner/Info.plist"
            echo "Maps key injected."
          else
            echo "MAPS_API_KEY_IOS not set - map tiles will not render."
          fi

      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        script: |
          APP_PATH="$CM_BUILD_DIR/build/ios/iphoneos/Runner.app"
          PAYLOAD_DIR="$CM_BUILD_DIR/Payload"
          IPA_PATH="$CM_BUILD_DIR/CruiseDispatch_unsigned.ipa"
          mkdir -p "$PAYLOAD_DIR"
          cp -r "$APP_PATH" "$PAYLOAD_DIR/"
          cd "$CM_BUILD_DIR"
          zip -r "$IPA_PATH" Payload/
          echo "IPA created: $IPA_PATH"

    artifacts:
      - CruiseDispatch_unsigned.ipa

    publishing:
      email:
        recipients:
          - josmash2021@gmail.com
        notify:
          success: true
          failure: true


  # -----------------------------------------------------------------------
  # iOS Release: signed IPA for App Store / TestFlight
  # -----------------------------------------------------------------------
  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
        - firebase_credentials
        - google_maps
      vars:
        BUNDLE_ID: "com.uberclone.dispatch.dispatchApp"
        XCODE_SCHEME: "Runner"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"

    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: "master"
          include: true
          source: true

    scripts:
      - name: Normalize plist line endings (CRLF to LF)
        script: |
          find "$CM_BUILD_DIR/ios" -name "*.plist" -exec sed -i 's/\r//' {} +
          find "$CM_BUILD_DIR/ios" -name "*.xcconfig" -exec sed -i 's/\r//' {} +

      - name: Write GoogleService-Info.plist
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > "$CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist"
          fi

      - name: Inject Google Maps API key
        script: |
          if [ -n "$MAPS_API_KEY_IOS" ]; then
            /usr/libexec/PlistBuddy -c "Set :GMSApiKey $MAPS_API_KEY_IOS" "$CM_BUILD_DIR/ios/Runner/Info.plist"
          fi

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up Xcode code signing
        script: |
          xcode-project use-profiles --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"

      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter build IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - josmash2021@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false


  # -----------------------------------------------------------------------
  # Android Release
  # -----------------------------------------------------------------------
  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable
      groups:
        - firebase_credentials
        - google_maps

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "master"
          include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build Android AAB
        script: |
          flutter build appbundle --release --build-name=1.0.0 --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - josmash2021@gmail.com
        notify:
          success: true
          failure: true