workflows:

  ios-sideloadly:
    name: iOS Sideloadly (unsigned IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase_credentials
        - google_maps
      vars:
        BUNDLE_ID: "com.uberclone.dispatch.dispatchApp"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "master"
          include: true
          source: true
    scripts:
      - name: Normalize CRLF to LF in all plist and xcconfig files
        script: |
          find "$CM_BUILD_DIR/ios" -name "*.plist" -print0 | xargs -0 perl -i -pe 's/\r//g'
          find "$CM_BUILD_DIR/ios" -name "*.xcconfig" -print0 | xargs -0 perl -i -pe 's/\r//g'
          echo "Line endings normalized."

      - name: Write GoogleService-Info.plist
        script: |
          python3 << 'PYEOF'
          import os, textwrap
          plist = textwrap.dedent("""\
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          \t<key>API_KEY</key>
          \t<string>AIzaSyAdwPUqsI8UuaEQEXw6aaNz7umWeGdWjjg</string>
          \t<key>GCM_SENDER_ID</key>
          \t<string>56054738352</string>
          \t<key>PLIST_VERSION</key>
          \t<string>1</string>
          \t<key>BUNDLE_ID</key>
          \t<string>com.uberclone.dispatch.dispatchApp</string>
          \t<key>PROJECT_ID</key>
          \t<string>cruise-af9f1</string>
          \t<key>STORAGE_BUCKET</key>
          \t<string>cruise-af9f1.firebasestorage.app</string>
          \t<key>IS_ADS_ENABLED</key>
          \t<false/>
          \t<key>IS_ANALYTICS_ENABLED</key>
          \t<false/>
          \t<key>IS_APPINVITE_ENABLED</key>
          \t<true/>
          \t<key>IS_GCM_ENABLED</key>
          \t<true/>
          \t<key>IS_SIGNIN_ENABLED</key>
          \t<true/>
          \t<key>GOOGLE_APP_ID</key>
          \t<string>1:56054738352:ios:0000000000000000</string>
          </dict>
          </plist>
          """)
          path = os.path.join(os.environ['CM_BUILD_DIR'], 'ios', 'Runner', 'GoogleService-Info.plist')
          with open(path, 'w', newline='\n', encoding='utf-8') as f:
              f.write(plist)
          print(f"Written: {path}")
          PYEOF
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > "$CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist"
            perl -i -pe 's/\r//g' "$CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist"
            echo "Real GoogleService-Info.plist injected from secret."
          fi

      - name: Inject Google Maps API key
        script: |
          if [ -n "$MAPS_API_KEY_IOS" ]; then
            /usr/libexec/PlistBuddy -c "Set :GMSApiKey $MAPS_API_KEY_IOS" "$CM_BUILD_DIR/ios/Runner/Info.plist"
            echo "Maps key injected."
          fi

      - name: Validate all plist files with plutil
        script: |
          FAIL=0
          while IFS= read -r -d '' f; do
            if plutil -lint "$f" > /dev/null 2>&1; then
              echo "OK: $f"
            else
              echo "FAIL: $f"
              plutil -lint "$f" || true
              FAIL=1
            fi
          done < <(find "$CM_BUILD_DIR/ios" -name "*.plist" -print0)
          if [ "$FAIL" = "1" ]; then exit 1; fi

      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter build iOS no codesign
        script: |
          flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        script: |
          APP_PATH="$CM_BUILD_DIR/build/ios/iphoneos/Runner.app"
          PAYLOAD="$CM_BUILD_DIR/Payload"
          IPA="$CM_BUILD_DIR/CruiseDispatch_unsigned.ipa"
          mkdir -p "$PAYLOAD"
          cp -r "$APP_PATH" "$PAYLOAD/"
          cd "$CM_BUILD_DIR"
          zip -r "$IPA" Payload/
          echo "IPA ready: $IPA"

    artifacts:
      - CruiseDispatch_unsigned.ipa

    publishing:
      email:
        recipients:
          - josmash2021@gmail.com
        notify:
          success: true
          failure: true


  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
        - firebase_credentials
        - google_maps
      vars:
        BUNDLE_ID: "com.uberclone.dispatch.dispatchApp"
        XCODE_SCHEME: "Runner"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: "master"
          include: true
          source: true
    scripts:
      - name: Normalize CRLF to LF
        script: |
          find "$CM_BUILD_DIR/ios" -name "*.plist" -print0 | xargs -0 perl -i -pe 's/\r//g'
          find "$CM_BUILD_DIR/ios" -name "*.xcconfig" -print0 | xargs -0 perl -i -pe 's/\r//g'

      - name: Inject GoogleService-Info.plist
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > "$CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist"
            perl -i -pe 's/\r//g' "$CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist"
          fi

      - name: Inject Google Maps API key
        script: |
          if [ -n "$MAPS_API_KEY_IOS" ]; then
            /usr/libexec/PlistBuddy -c "Set :GMSApiKey $MAPS_API_KEY_IOS" "$CM_BUILD_DIR/ios/Runner/Info.plist"
          fi

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up Xcode code signing
        script: |
          xcode-project use-profiles --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"

      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter build IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - josmash2021@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false


  android-release:
    name: Android Release Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      groups:
        - firebase_credentials
        - google_maps
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "master"
          include: true
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Build Android AAB
        script: |
          flutter build appbundle --release --build-name=1.0.0 --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - josmash2021@gmail.com
        notify:
          success: true
          failure: true